report_comment: "Report generated by the ATAC/ChIP-seq pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# Ordine dei moduli (senza bloccare gli altri)
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

# Ordine sezioni: Numeri bassi = Alto / Numeri alti = Basso
report_section_order:
  fastqc:
    order: 10
  cutadapt:
    order: 20
  bowtie2:
    order: 30
  samtools:
    order: 40
  picard:
    order: 50
  macs3_narrow_count:
    order: 60
  macs3_broad_count:
    order: 70
  diffbind_profile:
    order: 80
  frip_score:
    order: 90
  homer_annotations:
    order: 100
  deeptools:
    order: 110
  software_versions:
    order: 120

custom_data:
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"
  diffbind_profile:
    section_name: "DiffBind: Differential Binding Profile"
  software_versions:
    section_name: "Software Versions"
    parent_id: "custom_content"

sp:
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  frip_score:
    fn: "*.FRiP.txt"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  diffbind_profile:
    fn: "*_mqc.html"
  software_versions:
    fn: "collated_versions.yml"

sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
  - "_mqc"
  
