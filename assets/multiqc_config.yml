report_comment: "Report generato dalla pipeline ATAC/ChIP-seq. Analisi della qualità, allineamento e peak calling."
title: "Analisi ChIP-seq/ATAC-seq"

# --- 1. ORDINE MACRO DEI MODULI ---
module_order:
  - fastqc:
      name: 'Qualità Iniziale (FastQC)'
  - cutadapt:
      name: 'Trimming (TrimGalore)'
  - bowtie2:
      name: 'Allineamento (Bowtie2)'
  - samtools:
      name: 'Statistiche Allineamento (Samtools)'
  - picard:
      name: 'Rimozione Duplicati (Picard)'
  - deeptools:
      name: 'Qualità Arricchimento (deepTools)'
  - custom_content: 
      name: 'Analisi Picchi e Annotazione'

# --- 2. ORDINE DI VISUALIZZAZIONE DELLE SEZIONI ---
report_section_order:
  fastqc:
    order: -1000
  trim_galore:
    order: -900
  bowtie2:
    order: -800
  samtools:
    order: -700
  picard:
    order: -600
  # Specifichiamo le sotto-sezioni di deeptools per evitare che finiscano in fondo
  deeptools_fingerprint:
    order: -550
  deeptools_bam_coverage:
    order: -540
  macs3_narrow_count: 
    order: -400
  macs3_broad_count: 
    order: -300
  frip_score:        
    order: -200
  peak_annotations:  
    order: -100

# --- 3. CONFIGURAZIONE DATI CUSTOM ---
custom_data:
  macs3_narrow_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Narrow"
    plot_type: "bargraph"
    pconfig:
      id: "macs3_narrow_plot"
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  
  macs3_broad_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Broad"
    plot_type: "bargraph"
    pconfig:
      id: "macs3_broad_plot"
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"

  frip_score:
    file_format: "tsv"
    section_name: "Qualità: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      id: "frip_score_bargraph"
      title: "FRiP Score per Campione"
      ylab: "FRiP Score"
      max: 1

  peak_annotations:
    file_format: "tsv"
    section_name: "Annotazione: Distribuzione Genomica"
    plot_type: "bargraph"
    pconfig:
      id: "homer_peak_annotation_plot"
      title: "Distribuzione Picchi (Percentuale)"
      stacking: "percent"
      colors:
        "promoter-TSS": "#f15c80" # Attenzione: HOMER usa spesso il minuscolo
        "Promoter-TSS": "#f15c80"
        "Intergenic": "#7cb5ec"
        "TTS": "#434348"
        "exon": "#f7a35c"
        "intron": "#8085e9"

# --- 4. REGOLE DI RICERCA ---
sp:
  deeptools_fingerprint:
    fn: "*.fingerprint.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  frip_score:
    fn: "*.FRiP.txt"
  peak_annotations:
    fn: "*.homer_stats.txt"

# --- 5. PULIZIA NOMI ---
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
