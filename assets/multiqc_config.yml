report_section_order:
  fastqc: {order: -100}
  trim_galore: {order: -90}
  bowtie2: {order: -80}
  macs3_narrow_count: {order: -70}
  macs3_broad_count: {order: -60}
  frip_score: {order: -50} # Posizionato come richiesto
  peak_annotations: {order: -40}

custom_data:
  # Sezione Peak Count (Narrow)
  macs3_narrow_count:
    file_format: "tsv"
    section_name: "MERGED LIB: MACS3 Narrow Peak Count"
    description: "is calculated from total number of peaks called by <a href='https://github.com/macs3-project/MACS'>MACS3</a>."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_narrow_plot"
      title: "Total Peak Count (Narrow)"
      ylab: "Peak Count"
      cpswitch: true

  # Sezione Peak Count (Broad)
  macs3_broad_count:
    file_format: "tsv"
    section_name: "MERGED LIB: MACS3 Broad Peak Count"
    description: "is calculated from total number of peaks called by <a href='https://github.com/macs3-project/MACS'>MACS3</a>."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_broad_plot"
      title: "Total Peak Count (Broad)"
      ylab: "Peak Count"
      cpswitch: true

  # Sezione FRiP Score (Screenshot 10.17.43)
  frip_score:
    file_format: "tsv"
    section_name: "MERGED LIB: MACS3 FRiP score"
    description: "is generated by calculating the fraction of all mapped reads that fall into the MACS3 called peak regions. A read must overlap a peak by at least 20% to be counted. See <a href='https://genome.ucsc.edu/FAQ/FAQformat.html#format13'>FRiP score</a>."
    plot_type: "bargraph"
    pconfig:
      id: "frip_score_bargraph"
      title: "FRiP score"
      ylab: "FRiP score"
      max: 1
      cpswitch: true

  peak_annotations:
    file_format: "tsv"
    section_name: "MERGED LIB: HOMER peak annotation"
    description: "is generated by calculating the proportion of peaks assigned to genomic features by <a href='http://homer.ucsd.edu/homer/ngs/annotation.html'>HOMER annotatePeaks.pl</a>."
    plot_type: "bargraph"
    pconfig:
      id: "homer_peak_annotation_plot"
      title: "Peak to feature proportion"
      ylab: "Peak count"
      stacking: "percent" # Inizia visualizzando in percentuale (Screenshot 11.05.16)
      cpswitch: true      # Abilita il bottone "Percentages"
      colors:
        Intergenic: "#7cb5ec"
        TTS: "#434348"
        exon: "#f7a35c"
        intron: "#8085e9"
        "promoter-TSS": "#f15c80"



sp:
  macs3_narrow_count: {fn: "*.narrow_counts.txt"}
  macs3_broad_count: {fn: "*.broad_counts.txt"}
  frip_score: {fn: "*.FRiP.txt"}

sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - "_peaks"
