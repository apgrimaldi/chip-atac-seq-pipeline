report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Quality Control, Alignment, and Peak Calling analysis."
title: "ATAC-seq/ChIP-seq Analysis Report"

# --- 1. MODULE EXECUTION ORDER ---
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - deeptools
  - custom_content

# --- 2. REPORT SECTION ORDER ---
report_section_order:
  fastqc:
    order: -1000
  cutadapt:                
    order: -900
  bowtie2:
    order: -800
  samtools-stats:
    order: -700
  picard_markduplicates:
    order: -600
  deeptools_fingerprint:
    order: -550
  deeptools_bam_coverage:
    order: -540
  homer_annotations:      
    order: -400
  macs3_narrow_count: 
    order: -350
  macs3_broad_count: 
    order: -300
  frip_score:              
    order: -200

# --- 3. CUSTOM DATA CONFIGURATION ---
custom_data:
  macs3_narrow_count:
    file_format: "tsv"
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      id: "macs3_narrow_plot"
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  
  macs3_broad_count:
    file_format: "tsv"
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      id: "macs3_broad_plot"
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"

  frip_score:
    file_format: "tsv"
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      id: "frip_score_bargraph"
      title: "FRiP Score per Sample"
      ylab: "FRiP Score"
      max: 1

  homer_annotations:
    file_format: "tsv"
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"
    pconfig:
      id: "homer_peak_annotation_plot"
      title: "Peak Distribution (%)"
      stacking: "percent"
      colors:
        "promoter-TSS": "#f15c80"
        "Promoter-TSS": "#f15c80"
        "Intergenic": "#7cb5ec"
        "TTS": "#434348"
        "exon": "#f7a35c"
        "intron": "#8085e9"

# --- 4. SEARCH PATTERNS ---
sp:
  deeptools_fingerprint:
    fn: "*.fingerprint.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  frip_score:
    fn: "*.FRiP.txt"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"

# --- 5. SAMPLE NAME CLEANUP ---
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
