report_comment: "Report generated by the ATAC/ChIP-seq pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# Nascondiamo Samtools e DeepTools dalla tabella riassuntiva in cima (General Stats)
# Questo è l'unico modo per evitare che vengano "tirati su" all'inizio del report.
table_columns_visible:
  samtools: False
  deeptools: False

report_section_order:
  fastqc:
    order: 10
  cutadapt:
    order: 20
  bowtie2:
    order: 30
  samtools_alignment_plot:
    order: 40
  samtools-stats-dp:
    order: 50
  picard_deduplication:
    order: 60
  macs3_narrow_count:
    order: 70
  macs3_broad_count:
    order: 80
  diffbind_profile:
    order: 90
  frip_score:
    order: 100
  homer_annotations:
    order: 110
  deeptools_fingerprint_plot:
    order: 120
  plotFingerprint_quality_metrics:
    order: 125
  software_versions:
    order: 130

custom_data:
  software_versions:
    section_name: "Software Versions"
    parent_id: "custom_content"
    order: 130

sp:
  software_versions:
    fn: "collated_versions.yml"
  diffbind_profile:
    fn: "*_mqc.html"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
