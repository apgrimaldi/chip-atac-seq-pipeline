report_comment: "Report generated by the ATAC/ChIP-seq pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# 1. ELIMINA IL MODULO FANTASMA (MACS2)
# Questo farà sparire i "filtered fragments" e farà riapparire i tuoi picchi MACS3
exclude_modules:
  - macs2

# 2. ORDINE MACRO-MODULI
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - custom_content
  - picard
  - deeptools

# 3. ORDINE SEZIONI (ID esatti estratti dal tuo file JSON)
report_section_order:
  fastqc: {order: -100}
  cutadapt: {order: -200}
  bowtie2: {order: -300}
  
  # Samtools: l'ID nel tuo JSON è con l'underscore
  samtools_stats: {order: -400}
  samtools_flagstat: {order: -410}
  
  # Picard: DAL TUO JSON l'ID reale è questo:
  picard_mark_duplicates: {order: -500}

  # I TUOI PICCHI (Ora riappariranno perché abbiamo escluso il modulo macs2)
  macs3_narrow_count: {order: -600}
  macs3_broad_count: {order: -700}
  
  diffbind_profile: {order: -800}
  frip_score: {order: -900}
  
  homer_annotations_narrow: {order: -1000}
  homer_annotations_broad: {order: -1010}
  
  # DeepTools: ID corretti per i file che hai caricato
  deeptools_plot_fingerprint_counts: {order: -1100}
  deeptools_plot_fingerprint_metrics: {order: -1110}
  
  software_versions: {order: -1200}

# 4. CONFIGURAZIONE DATI CUSTOM
custom_data:
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  software_versions:
    section_name: "Software Versions"
  # Assicurati che NON ci sia parent_id: custom_content qui sopra
