report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

# --- 1. FORZA L'ORDINE DEI MODULI (LOGICA DI CARICAMENTO) ---
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - deeptools
  - custom_content

# --- 2. FORZA L'ORDINE VISIVO (LA CATENA) ---
# Usiamo 'before' per creare un ordine gerarchico indistruttibile
report_section_order:
  fastqc:
    order: -1000
  cutadapt:
    order: -900
  bowtie2:
    order: -800
  samtools:
    order: -700
  picard:
    order: -600
  # --- SEZIONI CUSTOM INCATENATE ---
  # Diciamo a MultiQC: "Metti questo PRIMA di quello"
  macs3_broad_count:
    before: deeptools
  macs3_narrow_count:
    before: macs3_broad_count
  frip_score:
    before: macs3_narrow_count
  homer_annotations:
    before: frip_score
  # --------------------------------
  deeptools:
    order: -500
  software_versions:
    order: -100

# --- 3. CONFIGURAZIONE DATI CUSTOM (Assicurati che gli ID siano identici agli header nei file .txt) ---
custom_data:
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"

  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      title: "FRiP Score per Sample"
      ylab: "FRiP Score"
      max: 1

  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"
    pconfig:
      title: "Peak Distribution (%)"
      stacking: "percent"

# --- 4. SEARCH PATTERNS ---
sp:
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

# --- 5. CLEANUP ---
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
