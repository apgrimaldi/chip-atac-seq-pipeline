report_comment: "Report generato dalla pipeline ATAC/ChIP-seq. Analisi della qualità, allineamento e peak calling."
title: "Analisi ChIP-seq/ATAC-seq"

# --- 1. ORDINE MACRO DEI MODULI ---
module_order:
  - fastqc:
      name: 'Qualità Iniziale (FastQC)'
  - cutadapt:
      name: 'Trimming (TrimGalore)'
  - bowtie2:
      name: 'Allineamento (Bowtie2)'
  - samtools:
      name: 'Statistiche Allineamento (Samtools)'
  - picard:
      name: 'Rimozione Duplicati (Picard)'
  - deeptools:
      name: 'Visualizzazione (DeepTools)'
  - custom_content: # Qui verranno inseriti i grafici MACS3, FRiP e Annotazione
      name: 'Analisi Picchi e Annotazione'

# --- 2. ORDINE DI VISUALIZZAZIONE DELLE SEZIONI ---
# Più il numero è basso (es -1000), più la sezione appare in alto
report_section_order:
  fastqc:
    order: -1000
  trim_galore:
    order: -900
  bowtie2:
    order: -800
  samtools:
    order: -700
  picard:
    order: -600
  deeptools:
    order: -500
  macs3_narrow_count: # Custom content 1
    order: -400
  macs3_broad_count: # Custom content 2
    order: -300
  frip_score:        # Custom content 3
    order: -200
  peak_annotations:  # Custom content 4 (Homer)
    order: -100

# --- 3. CONFIGURAZIONE DATI CUSTOM ---
custom_data:
  macs3_narrow_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Narrow"
    description: "Numero totale di picchi narrow identificati."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_narrow_plot"
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  
  macs3_broad_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Broad"
    description: "Numero totale di picchi broad identificati."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_broad_plot"
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"

  frip_score:
    file_format: "tsv"
    section_name: "Qualità: FRiP Score"
    description: "Fraction of Reads in Peaks (FRiP): efficienza dell'arricchimento."
    plot_type: "bargraph"
    pconfig:
      id: "frip_score_bargraph"
      title: "FRiP Score per Campione"
      ylab: "FRiP Score"
      max: 1

  peak_annotations:
    file_format: "tsv"
    section_name: "Annotazione: Distribuzione Genomica"
    description: "Distribuzione dei picchi calcolata da HOMER."
    plot_type: "bargraph"
    pconfig:
      id: "homer_peak_annotation_plot"
      title: "Distribuzione Picchi (Percentuale)"
      stacking: "percent"
      colors:
        "Promoter-TSS": "#f15c80"
        "Intergenic": "#7cb5ec"
        "TTS": "#434348"
        "Exon": "#f7a35c"
        "Intron": "#8085e9"

# --- 4. REGOLE DI RICERCA ---
sp:
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  frip_score:
    fn: "*.FRiP.txt"
  peak_annotations:
    fn: "*.homer_stats.txt"

# --- 5. PULIZIA NOMI ---
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1" # Tipico di TrimGalore
  - "_val_2"
