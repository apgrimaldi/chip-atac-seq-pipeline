report_comment: "Report generated by the ATAC/ChIP-seq pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# 2. Ordine dei Macro-Moduli
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

# 3. ORDINE DELLE SEZIONI (Tua logica numeri negativi)
report_section_order:
  fastqc:
    order: -100
  cutadapt:
    order: -200
  bowtie2:
    order: -300
    
  # --- FIX SAMTOOLS ---
  # Dai tuoi dati l'ID è con l'underscore
  samtools_stats:
    order: -400
  samtools_flagstat:
    order: -410
    
  # --- FIX PICARD ---
  # Dai tuoi dati l'ID esatto è questo (senza trattino centrale)
  picard_dups:
    order: -500

  # --- SEZIONI CUSTOM ---
  macs3_narrow_count:
    order: -600
  macs3_broad_count:
    order: -700
  diffbind_profile:
    order: -800
  frip_score:
    order: -900
    
  # --- FIX HOMER ---
  homer_annotations_narrow:
    order: -1000
  homer_annotations_broad:
    order: -1010
    
  # --- FIX DEEPTOOLS ---
  # L'ancora corretta per plotFingerprint
  deeptools_plot_fingerprint_count:
    order: -1100
  deeptools_plot_fingerprint_metrics:
    order: -1110
    
  # --- VERSIONI ---
  software_versions:
    order: -1200

custom_data:
  # IMPORTANTE: assicurati che NON ci sia parent_id: "custom_content"
  software_versions:
    section_name: "Software Versions"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
  frip_score:
    section_name: "QC: FRiP Score"
  homer_annotations_narrow:
    section_name: "Annotation: Genomic Distribution (Narrow)"
  homer_annotations_broad:
    section_name: "Annotation: Genomic Distribution (Broad)"
